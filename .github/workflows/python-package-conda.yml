name: AI Calling Backend CI/CD

on:
  push:
    branches:
      - main
      - master
      - dev

  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:

    # =========================
    # Checkout Repository
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # Setup Python
    # =========================
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # =========================
    # Install System Packages
    # =========================
    - name: Install FFmpeg and system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ffmpeg \
          libsm6 \
          libxext6 \
          libgl1

    # =========================
    # Upgrade pip
    # =========================
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    # =========================
    # Install Dependencies
    # =========================
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    # =========================
    # Install Lint Tools
    # =========================
    - name: Install flake8
      run: |
        pip install flake8

    # =========================
    # Run Linter
    # =========================
    - name: Lint with flake8
      run: |
        flake8 . \
        --count \
        --select=E9,F63,F7,F82 \
        --show-source \
        --statistics

        flake8 . \
        --count \
        --exit-zero \
        --max-complexity=10 \
        --max-line-length=127 \
        --statistics

    # =========================
    # Install Pytest
    # =========================
    - name: Install pytest
      run: |
        pip install pytest

    # =========================
    # Run Tests
    # =========================
    - name: Run tests
      run: |
        pytest

    # =========================
    # Build Success
    # =========================
    - name: Build completed
      run: |
        echo "Build completed successfully"
